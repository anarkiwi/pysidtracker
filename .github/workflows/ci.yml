name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: black --check
        run: black --check src tests
      - name: pylint
        run: pylint src tests
      - name: pytest + coverage (> 85%)
        run: pytest --cov=pysidtracker --cov-report=term-missing --cov-fail-under=85

  oracle:
    # Byte-exact comparison of the py65 render against the sidtrace sidplayfp
    # oracle over real HVSC tunes. Never skipped: a failed HVSC download or
    # oracle render fails the job. HVSC tunes and oracle CSVs are cached.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Pull sidtrace oracle image
        id: image
        run: |
          docker pull anarkiwi/sidtrace:latest
          digest=$(docker inspect --format '{{index .RepoDigests 0}}' anarkiwi/sidtrace:latest)
          echo "digest=${digest##*@}" >> "$GITHUB_OUTPUT"
      - name: Cache HVSC tunes
        uses: actions/cache@v4
        with:
          path: .oracle-cache/hvsc
          key: hvsc-${{ hashFiles('tests/test_oracle_hvsc.py') }}
          restore-keys: hvsc-
      - name: Cache oracle CSVs
        uses: actions/cache@v4
        with:
          path: .oracle-cache/csv
          key: oracle-csv-${{ steps.image.outputs.digest }}-${{ hashFiles('tests/test_oracle_hvsc.py') }}
      - name: Oracle comparison (never skipped)
        run: pytest -m oracle -n auto

  exomizer:
    # Real exomizer round-trip for the native (pydexomizer) decrunch path. Its
    # own job builds the reference exomizer, so the test runs for real -- never
    # skipped -- while the default matrix stays exomizer-free (`-m 'not exomizer'`).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build the reference exomizer cruncher
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential git bison flex
          git clone https://bitbucket.org/magli143/exomizer.git /tmp/exomizer
          make -C /tmp/exomizer/src exomizer
          echo "EXOMIZER=/tmp/exomizer/src/exomizer" >> "$GITHUB_ENV"
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Real exomizer round-trip (never skipped)
        run: pytest -m exomizer -o addopts='' -n auto

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke test the wheel
        run: |
          pip install dist/*.whl
          python -c "import pysidtracker; print(pysidtracker.__version__)"
